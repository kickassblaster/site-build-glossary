<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bot Glossary">
<meta name="theme-color" content="#0b0f1a">
<title>Site Build Glossary</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230b0f1a'/%3E%3Ctext x='90' y='118' font-size='95' text-anchor='middle' font-family='-apple-system,Segoe UI,sans-serif' font-weight='800' fill='%234da3ff'%3EB%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0b0f1a; --panel:#131a2a; --panel2:#1b2436; --line:#26314a;
    --text:#e9eef7; --muted:#94a3bf; --accent:#4da3ff; --accent2:#7c5cff;
    --chip:#1b2436; --hi:#ffd86b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg, rgba(11,15,26,.98), rgba(11,15,26,.92));
    backdrop-filter:blur(12px);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 10px;
    border-bottom:1px solid var(--line);
  }
  h1{margin:0 0 10px; font-size:19px; letter-spacing:.2px; display:flex; align-items:center; gap:9px}
  h1 .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .search{position:relative}
  .search input{
    width:100%; font-size:17px; color:var(--text);
    background:var(--panel); border:1px solid var(--line); border-radius:13px;
    padding:13px 40px 13px 42px; outline:none;
  }
  .search input:focus{border-color:var(--accent)}
  .search .ico{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px}
  .search .clear{position:absolute; right:10px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:20px; padding:6px; cursor:pointer; display:none; line-height:1}
  .chips{display:flex; gap:8px; overflow-x:auto; padding:11px 2px 2px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; font-size:13px; padding:7px 13px; border-radius:999px;
    background:var(--chip); color:var(--muted); border:1px solid var(--line);
    white-space:nowrap; cursor:pointer; user-select:none;
  }
  .chip.active{background:var(--accent); color:#04101f; border-color:var(--accent); font-weight:600}
  main{padding:8px 14px 40px; max-width:760px; margin:0 auto}
  .count{color:var(--muted); font-size:12.5px; padding:10px 4px 4px}
  .seclabel{
    font-size:12px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
    color:var(--accent); margin:18px 4px 8px;
  }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:10px;
  }
  .term{font-size:16.5px; font-weight:700; margin:0 0 5px; line-height:1.3}
  .def{font-size:15px; line-height:1.55; color:#cdd6e8; margin:0}
  .def code, .term code{background:var(--panel2); padding:1px 5px; border-radius:5px; font-size:.9em}
  mark{background:var(--hi); color:#1a1300; border-radius:3px; padding:0 2px}
  .empty{text-align:center; color:var(--muted); padding:60px 20px; font-size:15px}
  .foot{text-align:center; color:var(--muted); font-size:11.5px; padding:24px 10px 8px; opacity:.7}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span> Site Build Glossary</h1>
  <div class="search">
    <span class="ico">&#128269;</span>
    <input id="q" type="search" inputmode="search" autocomplete="off" autocapitalize="none"
           placeholder="Search terms &amp; definitions&hellip;" enterkeyhint="search">
    <span class="clear" id="clear">&times;</span>
  </div>
  <div class="chips" id="chips"></div>
</header>
<main>
  <div class="count" id="count"></div>
  <div id="list"></div>
  <div class="foot">Get Found By Bots &middot; 55 terms &middot; works offline</div>
</main>

<script>
const DATA = [{"category": "Structured Data & Schema", "terms": [{"term": "Schema markup", "def": "Machine-readable data embedded in a page that labels what things are (this is an Organization, this is its founder). The vocabulary comes from Schema.org."}, {"term": "JSON-LD (JavaScript Object Notation for Linked Data)", "def": "The format the schema is written in: a script block in the page's HTML. Google's and the LLMs' preferred format (vs. older inline methods like Microdata/RDFa)."}, {"term": "@graph", "def": "A JSON-LD wrapper holding multiple schema nodes in one block so they can interrelate, instead of isolated per-page snippets."}, {"term": "@id", "def": "A unique URL-shaped identifier on each schema node (.../#organization) that lets other nodes reference it. The wiring that turns scattered facts into a connected graph."}, {"term": "@type", "def": "Declares what a node is (Organization, Person, Service, FAQPage). Drawn from Schema.org's type list."}, {"term": "sameAs", "def": "A schema property listing other URLs for the same entity (your LinkedIn, Reddit, directory profiles). The explicit \"these are all me\" declaration for entity reconciliation."}, {"term": "knowsAbout", "def": "A schema property listing topics an entity has expertise in. Feeds the engine's sense of you as an authority on a subject."}, {"term": "Entity", "def": "Any distinct, identifiable thing (a business, person, place). The unit engines try to recognize and resolve."}, {"term": "Entity reconciliation / resolution", "def": "The engine's process of deciding that scattered references all point to the same entity. Schema @id/sameAs and NAP (Name, Address, Phone) consistency make this easy; ambiguity makes it fail."}, {"term": "Rich result / rich snippet", "def": "An enhanced search listing (star ratings, FAQ dropdowns) produced when schema is present. Note: a fading concern for GEO since the payoff is LLM ingestion, not the SERP (Search Engine Results Page) display."}]}, {"category": "Information Architecture & Site Structure", "terms": [{"term": "IA (Information Architecture)", "def": "How a site's content is organized and how pages relate to each other."}, {"term": "Entity hub", "def": "The central page (your homepage) everything links back to and the schema resolves to; the gravitational anchor of the site's identity."}, {"term": "Money page", "def": "A page built to convert, targeting high-commercial-intent searches (your /industries/[x] pages). Sits closest to the buying decision."}, {"term": "Vertical", "def": "An industry segment (DUI/criminal-defense, HVAC). \"Vertical page\" = a page targeting one."}, {"term": "Topic cluster", "def": "A group of interlinked pages covering one subject comprehensively, signaling topical authority (your /learn set)."}, {"term": "Topical authority", "def": "The accumulated signal that you're a comprehensive source on a subject, not a one-off mention. Built via clusters and internal linking."}, {"term": "Internal linking", "def": "Links between pages on your own site. Distributes authority and shows engines how content relates."}, {"term": "Pillar page / hub page", "def": "The central page of a cluster (e.g. /industries/) that links out to its members."}, {"term": "Slug", "def": "The human-readable tail of a URL (/industries/hvac → hvac). Should be clean, keyword-relevant, lowercase, hyphenated."}, {"term": "Canonical URL", "def": "The one \"official\" version of a page when duplicates could exist, declared via a rel=canonical tag so engines don't split or penalize."}, {"term": "Breadcrumb", "def": "The Home › Industries › HVAC navigation trail; also marked up in schema (BreadcrumbList) to show hierarchy."}]}, {"category": "Rendering & Build Stack", "terms": [{"term": "Rendering", "def": "How a page's content goes from code to viewable HTML. Where this happens (server, build-time, or browser) determines whether bots can read it."}, {"term": "SSG (Static Site Generation)", "def": "Pages are pre-built into finished HTML at build time. Fastest, and content is fully present in raw HTML — ideal for your JS-dependency check."}, {"term": "SSR (Server-Side Rendering)", "def": "HTML is generated on the server per request. Also bot-readable; better when content changes frequently."}, {"term": "CSR (Client-Side Rendering)", "def": "The browser builds the page with JavaScript after loading a near-empty shell. The thing to avoid — many AI crawlers won't execute JS, so content is invisible to them (your check #6 fails)."}, {"term": "SPA (Single-Page Application)", "def": "A site that loads once and rewrites content via JS without full page reloads. Typically CSR — the architecture your blueprint deliberately avoids."}, {"term": "Hydration", "def": "When a static/server-rendered page gets JS layered on afterward to make it interactive. Lets you get raw-HTML readability and interactivity."}, {"term": "Static site host / CDN (Content Delivery Network)", "def": "A network of servers that serve your pre-built files fast from locations near each visitor."}, {"term": "Build step", "def": "The process that compiles source code into the deployable site. \"Build time\" = when this runs (vs. \"runtime\" = when a user visits)."}]}, {"category": "Crawling, Indexing & AI Access", "terms": [{"term": "Crawler / bot / spider", "def": "An automated program that fetches pages. Search crawlers (Googlebot) and AI crawlers (GPTBot, ClaudeBot, PerplexityBot) each have their own."}, {"term": "Indexing", "def": "A crawler storing and organizing a page so it can be retrieved later. Brand-new sites take time to get indexed — outside your control."}, {"term": "robots.txt", "def": "A root-level file telling crawlers what they may access. Your gate: explicitly allowing AI crawlers here is the opt-in."}, {"term": "llms.txt", "def": "A proposed standard file mapping your key pages/topics for LLMs — a curated guide to what matters most. Your tool rewards its presence."}, {"term": "sitemap.xml", "def": "A file listing your canonical URLs so crawlers know what exists. Referenced from robots.txt."}, {"term": "lastmod", "def": "A sitemap field noting when a URL last changed. Freshness signal the engines actually use (unlike priority/changefreq, now mostly ignored)."}, {"term": "Crawl budget", "def": "The number of pages a crawler will fetch in a given period. Rarely a constraint at your site's size, but clean IA helps."}, {"term": "AI-use token", "def": "A directive like Google-Extended or Applebot-Extended that controls whether your content can be used for AI, separate from being crawled for search. Not disallowing them is how you opt in."}]}, {"category": "Search & Visibility Concepts", "terms": [{"term": "SEO (Search Engine Optimization)", "def": "Optimizing to rank in traditional search results (the ten blue links)."}, {"term": "GEO (Generative Engine Optimization)", "def": "Optimizing to be surfaced/recommended by AI answer engines. Your whole business."}, {"term": "LLMO (Large Language Model Optimization)", "def": "Near-synonym for GEO; optimizing specifically for LLM outputs. (You'll see both terms in the wild.)"}, {"term": "SERP (Search Engine Results Page)", "def": "The page of results a search engine returns."}, {"term": "RAG (Retrieval-Augmented Generation)", "def": "When an LLM fetches live external info (via search) before answering, instead of relying only on training memory. The mechanism GEO targets — you want to be what gets retrieved."}, {"term": "Grounding", "def": "When a model's answer is tied to retrieved/live sources rather than memory alone. \"Web-grounded\" = it searched."}, {"term": "YMYL (Your Money or Your Life)", "def": "Topics affecting health, finances, safety (legal/medical/financial). Engines weight trust signals heavily here — your core verticals."}, {"term": "E-E-A-T (Experience, Expertise, Authoritativeness, Trustworthiness)", "def": "Google's framework for content quality, critical in YMYL. Your About page and author schema build it."}, {"term": "NAP (Name, Address, Phone)", "def": "The consistent business-identity fingerprint used for entity matching across the web."}, {"term": "CPC (Cost Per Click) / CPA (Cost Per Acquisition)", "def": "Paid-search cost metrics; the high-CPC verticals are your targets. (More GTM than site, but you'll reference them.)"}, {"term": "Citation", "def": "In GEO terms, an instance of an engine referencing/recommending you in an answer. The outcome you're optimizing for."}]}, {"category": "Content & On-Page Elements", "terms": [{"term": "Title tag", "def": "The page's HTML <title>; what shows as the clickable headline in search and what tells engines the page's subject first."}, {"term": "Meta description", "def": "A short HTML summary of the page; influences click-through and gives engines a content signal."}, {"term": "Heading hierarchy (H1–H6)", "def": "The structural outline of a page (<h1> once, <h2> for sections). Helps both readers and engines parse structure."}, {"term": "FAQ block", "def": "A question-and-answer section, marked up as FAQPage schema. High-value for GEO because it pre-answers the literal prompts users type to LLMs."}, {"term": "Extractability", "def": "How easily an engine can pull a clean, self-contained answer from your text. Favored by direct, well-structured prose over rambling copy."}, {"term": "Alt text", "def": "Descriptive text on images for accessibility and so engines (which can't \"see\" images) know their content."}, {"term": "Semantic HTML", "def": "Using meaningful tags (<article>, <nav>, <section>) over generic <div>s, so structure is machine-clear."}]}];
const ALL = [];
DATA.forEach((s,si)=> s.terms.forEach(t=> ALL.push({term:t.term, def:t.def, cat:s.category, ci:si})));

const qEl=document.getElementById('q'), listEl=document.getElementById('list'),
      countEl=document.getElementById('count'), chipsEl=document.getElementById('chips'),
      clearEl=document.getElementById('clear');
let activeCat=null;

// auto-wrap things that look like code (tags, files, @props) in <code>
function codeify(s){
  return s.replace(/(&lt;[^&]+?&gt;|robots\.txt|llms\.txt|sitemap\.xml|rel=canonical|@\w+|H1[–-]H6)/g, '<code>$1</code>');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(text, q){
  let out = esc(text);
  if(q){
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    out = out.replace(re,'<mark>$1</mark>');
  }
  return codeify(out);
}

function buildChips(){
  const cats = ['All', ...DATA.map(s=>s.category)];
  chipsEl.innerHTML='';
  cats.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='chip'+((activeCat===null&&i===0)||activeCat===c?' active':'');
    el.textContent = c==='All'?'All':c.replace(/ &.*$/,'').replace(/^(.{18}).+/,'$1…');
    el.title=c;
    el.onclick=()=>{ activeCat = c==='All'?null:c; render(); };
    chipsEl.appendChild(el);
  });
}

function render(){
  const q=qEl.value.trim().toLowerCase();
  clearEl.style.display = qEl.value?'block':'none';
  let rows = ALL.filter(r=>{
    if(activeCat && r.cat!==activeCat) return false;
    if(!q) return true;
    return (r.term+' '+r.def).toLowerCase().includes(q);
  });
  // refresh active chip states
  [...chipsEl.children].forEach(ch=>{
    const on = (ch.textContent==='All' && activeCat===null) || ch.title===activeCat;
    ch.classList.toggle('active',on);
  });
  countEl.textContent = rows.length + (rows.length===1?' term':' terms') + (q?` matching “${qEl.value.trim()}”`:'') ;
  if(!rows.length){ listEl.innerHTML='<div class="empty">No matches.<br>Try a different word.</div>'; return; }
  let html='', lastCat=null;
  rows.forEach(r=>{
    if(r.cat!==lastCat){ html+=`<div class="seclabel">${esc(r.cat)}</div>`; lastCat=r.cat; }
    html+=`<div class="card"><p class="term">${hl(r.term,q)}</p>`+
          (r.def?`<p class="def">${hl(r.def,q)}</p>`:'')+`</div>`;
  });
  listEl.innerHTML=html;
  window.scrollTo({top:0});
}

qEl.addEventListener('input',render);
clearEl.onclick=()=>{ qEl.value=''; qEl.focus(); render(); };
buildChips(); render();
</script>
</body>
</html>
