<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">

<title>SEO &amp; GEO Glossary</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230b0f1a'/%3E%3Ctext x='90' y='118' font-size='95' text-anchor='middle' font-family='-apple-system,Segoe UI,sans-serif' font-weight='800' fill='%234da3ff'%3EB%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0b0f1a; --panel:#131a2a; --panel2:#1b2436; --line:#26314a;
    --text:#e9eef7; --muted:#94a3bf; --accent:#4da3ff; --accent2:#7c5cff;
    --chip:#1b2436; --hi:#ffd86b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg, rgba(11,15,26,.98), rgba(11,15,26,.92));
    backdrop-filter:blur(12px);
    padding:calc(env(safe-area-inset-top) + 14px) 16px 10px;
    border-bottom:1px solid var(--line);
  }
  h1{margin:0 0 10px; font-size:19px; letter-spacing:.2px; display:flex; align-items:center; gap:9px}
  h1 .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .search{position:relative}
  .search input{
    width:100%; font-size:17px; color:var(--text);
    background:var(--panel); border:1px solid var(--line); border-radius:13px;
    padding:13px 40px 13px 42px; outline:none;
  }
  .search input:focus{border-color:var(--accent)}
  .search .ico{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px}
  .search .clear{position:absolute; right:10px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:20px; padding:6px; cursor:pointer; display:none; line-height:1}
  .chips{display:flex; gap:8px; overflow-x:auto; padding:11px 2px 2px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; font-size:13px; padding:7px 13px; border-radius:999px;
    background:var(--chip); color:var(--muted); border:1px solid var(--line);
    white-space:nowrap; cursor:pointer; user-select:none;
  }
  .chip.active{background:var(--accent); color:#04101f; border-color:var(--accent); font-weight:600}
  main{padding:8px 14px 40px; max-width:760px; margin:0 auto}
  .count{color:var(--muted); font-size:12.5px; padding:10px 4px 4px}
  .seclabel{
    font-size:12px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
    color:var(--accent); margin:18px 4px 8px;
  }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:10px;
  }
  .term{font-size:16.5px; font-weight:700; margin:0 0 5px; line-height:1.3}
  .def{font-size:15px; line-height:1.55; color:#cdd6e8; margin:0}
  .def code, .term code{background:var(--panel2); padding:1px 5px; border-radius:5px; font-size:.9em}
  mark{background:var(--hi); color:#1a1300; border-radius:3px; padding:0 2px}
  .empty{text-align:center; color:var(--muted); padding:60px 20px; font-size:15px}
  .foot{text-align:center; color:var(--muted); font-size:11.5px; padding:24px 10px 8px; opacity:.7}
  .toolbar{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 4px 2px}
  .toolbar .count{padding:0}
  .seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:2px; flex:0 0 auto}
  .seg button{font-family:inherit; font-size:12.5px; color:var(--muted); background:none; border:0; padding:6px 12px; border-radius:8px; cursor:pointer}
  .seg button.active{background:var(--accent); color:#04101f; font-weight:600}
  .ex{margin-top:12px; border-top:1px solid var(--line); padding-top:11px}
  .ex-h{font-size:11px; font-weight:700; letter-spacing:.3px; text-transform:uppercase; color:var(--muted); margin-bottom:9px}
  .ex-row{display:flex; gap:8px; align-items:baseline; padding:3px 0; font-size:13.5px; line-height:1.4}
  .ex-tag{flex:0 0 auto; min-width:34px; text-align:center; font-size:10px; font-weight:700; letter-spacing:.3px;
    padding:2px 6px; border-radius:5px; font-family:ui-monospace,Menlo,monospace}
  .ex-t-h1{background:#173a5e; color:#9fd0ff}
  .ex-t-h2{background:#1f2c45; color:#8fb4e8}
  .ex-t-h3{background:#272443; color:#bbace8}
  .ex-t-faq{background:#3a2a17; color:#f0c178}
  .ex-t-page{background:#123730; color:#7fd9b8}
  .ex-text{color:#cfd8e8}
  .ex-note{color:var(--muted); font-size:12px}
  .ex-l1{margin-left:18px}
  .ex-l2{margin-left:38px}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span> SEO &amp; GEO Glossary</h1>
  <div class="search">
    <span class="ico">&#128269;</span>
    <input id="q" type="search" inputmode="search" autocomplete="off" autocapitalize="none"
           placeholder="Search terms &amp; definitions&hellip;" enterkeyhint="search">
    <span class="clear" id="clear">&times;</span>
  </div>
  <div class="chips" id="chips"></div>
</header>
<main>
  <div class="toolbar">
    <div class="count" id="count"></div>
    <div class="seg" id="seg">
      <button data-mode="cat" class="active">Category</button>
      <button data-mode="az">A&ndash;Z</button>
    </div>
  </div>
  <div id="list"></div>
  <div class="foot">Get Found By Bots &middot; 178 terms &middot; works offline</div>
</main>

<script>
const DATA = [{"category": "Core Disciplines & Optimization Targets", "terms": [{"term": "SEO (Search Engine Optimization)", "def": "The practice of improving a site so it ranks higher in unpaid (organic) search results."}, {"term": "GEO (Generative Engine Optimization)", "def": "Optimizing content to be surfaced, cited, and recommended inside AI-generated answers (ChatGPT, Gemini, Perplexity, AI Overviews)."}, {"term": "AEO (Answer Engine Optimization)", "def": "Optimizing for direct-answer surfaces — featured snippets, voice assistants, and AI answer boxes — where one consolidated response replaces a list of links."}, {"term": "LLMO (Large Language Model Optimization)", "def": "A near-synonym for GEO emphasizing optimization for LLM outputs specifically. The terms are often used interchangeably."}, {"term": "SXO (Search Experience Optimization)", "def": "SEO fused with UX and conversion — ranking is treated as inseparable from what the visitor does after the click."}, {"term": "SEM (Search Engine Marketing)", "def": "The umbrella for paid search advertising (and sometimes SEO too); in common usage it means the paid side."}, {"term": "PPC (Pay-Per-Click)", "def": "An ad model where you pay each time someone clicks your listing; the dominant format in paid search."}, {"term": "Organic search", "def": "Unpaid results earned through relevance and authority, as opposed to ads."}, {"term": "On-page SEO", "def": "Everything you control on the page itself: content, titles, headings, internal links, markup."}, {"term": "Off-page SEO", "def": "Signals earned beyond your site — primarily backlinks, mentions, and reputation."}, {"term": "Technical SEO", "def": "Site-level plumbing that affects crawling, rendering, indexing, and performance."}, {"term": "White-hat / Black-hat / Gray-hat", "def": "White-hat follows search-engine guidelines; black-hat manipulates against them (risking penalties); gray-hat lives in the ambiguous middle."}]}, {"category": "Search Engines, Crawling & Indexing", "terms": [{"term": "Crawler / bot / spider", "def": "An automated program that fetches pages (Googlebot for search; GPTBot, ClaudeBot, PerplexityBot for AI)."}, {"term": "Crawl budget", "def": "How many pages a crawler will fetch from your site in a given window. A constraint mainly for very large sites."}, {"term": "Crawl depth", "def": "How many clicks from the homepage a page sits. Deeper pages get crawled less and are seen as less important."}, {"term": "Indexing", "def": "The crawler storing and organizing a page so it can be served in results. Crawled is not the same as indexed."}, {"term": "Noindex", "def": "A directive (meta robots tag or HTTP header) telling engines not to include a page in the index."}, {"term": "X-Robots-Tag", "def": "An HTTP-header way to apply robots directives (noindex, nofollow) to non-HTML files like PDFs."}, {"term": "robots.txt", "def": "A root-level file telling crawlers which paths they may or may not access. Controls crawling, not indexing."}, {"term": "Robots meta tag", "def": "A page-level <meta name=\"robots\"> instruction (index/noindex, follow/nofollow, noarchive, etc.)."}, {"term": "Canonical URL", "def": "The declared \"official\" version of a page when duplicates exist, set via rel=canonical so engines consolidate signals."}, {"term": "sitemap.xml", "def": "A machine-readable list of your canonical URLs so crawlers know what exists; usually referenced from robots.txt."}, {"term": "Mobile-first indexing", "def": "Google indexes and ranks based on the mobile version of your pages by default."}, {"term": "Render budget", "def": "The limited resources engines spend executing JavaScript before indexing — a reason heavy client-side rendering hurts."}, {"term": "Orphan page", "def": "A page with no internal links pointing to it, making it hard to discover and easy to overlook."}, {"term": "Soft 404", "def": "A page that returns a 200 OK status but shows \"not found\" content, confusing crawlers."}, {"term": "Log file analysis", "def": "Inspecting server logs to see exactly which bots fetched which URLs, how often, and what they hit."}, {"term": "lastmod", "def": "A sitemap field noting when a URL last changed. A freshness signal engines actually use (unlike priority/changefreq, now mostly ignored)."}]}, {"category": "Keyword Research & Search Intent", "terms": [{"term": "Keyword / query", "def": "The word or phrase a user types into search; the demand signal you target."}, {"term": "Head term (short-tail)", "def": "A broad, high-volume, high-competition keyword (e.g. \"lawyer\")."}, {"term": "Long-tail keyword", "def": "A longer, more specific, lower-volume phrase with clearer intent and less competition (e.g. \"dui lawyer in phoenix free consult\")."}, {"term": "Seed keyword", "def": "A starting term you expand from to discover related keywords."}, {"term": "Search intent", "def": "The goal behind a query — informational, navigational, commercial (investigation), or transactional. Matching it is the whole game."}, {"term": "Search volume", "def": "The estimated number of monthly searches for a keyword."}, {"term": "Keyword difficulty", "def": "An estimate (usually 0–100) of how hard it is to rank for a term, based on competing pages' strength."}, {"term": "Keyword mapping", "def": "Assigning target keywords to specific pages so each page owns a distinct intent."}, {"term": "Keyword cannibalization", "def": "Multiple pages competing for the same query, splitting signals and confusing engines about which to rank."}, {"term": "Keyword stuffing", "def": "Cramming keywords unnaturally into content; a classic black-hat tactic that now triggers spam filters."}, {"term": "LSI keywords", "def": "\"Latent semantic indexing\" terms — popularly (if technically loosely) used to mean semantically related words that reinforce a topic."}, {"term": "Branded vs. non-branded", "def": "Queries that include your name versus generic queries; they behave very differently in intent and conversion."}, {"term": "SERP analysis", "def": "Studying who currently ranks for a query to infer intent, format, and the bar you must clear."}]}, {"category": "On-Page SEO & Content", "terms": [{"term": "Title tag", "def": "The page's HTML <title>; the clickable headline in results and a primary topical signal."}, {"term": "Meta description", "def": "A short HTML summary that influences click-through; not a direct ranking factor but it shapes the snippet."}, {"term": "Heading hierarchy (H1–H6)", "def": "The structural outline of a page; one clear <h1>, then <h2>/<h3> sections, helps readers and engines parse it."}, {"term": "URL slug", "def": "The readable tail of a URL (/blog/seo-basics → seo-basics); keep it short, lowercase, hyphenated, keyword-relevant."}, {"term": "Anchor text", "def": "The clickable words of a link; signals what the destination page is about to engines."}, {"term": "Internal linking", "def": "Links between your own pages that distribute authority and define topical relationships."}, {"term": "Alt text", "def": "Descriptive text on images for accessibility and so engines (which can't see the image) know its content."}, {"term": "Content depth", "def": "How comprehensively a page covers its topic and adjacent questions; depth tends to beat length for its own sake."}, {"term": "Content freshness", "def": "How recently content was updated; a real signal for time-sensitive topics, irrelevant for evergreen ones."}, {"term": "Duplicate content", "def": "Identical or near-identical text across URLs, which dilutes signals and forces engines to pick one version."}, {"term": "Thin content", "def": "Pages with little unique value; a quality liability that can drag down a whole site."}, {"term": "Content pruning", "def": "Deliberately removing, merging, or upgrading weak pages to raise overall site quality."}, {"term": "TF-IDF", "def": "\"Term frequency–inverse document frequency,\" a classic measure of how distinctive a term is to a document; used loosely to guide topical coverage."}, {"term": "Featured snippet optimization", "def": "Structuring answers (concise definitions, lists, tables) to win the boxed answer at the top of results."}, {"term": "Extractability", "def": "How easily an engine can lift a clean, self-contained answer from your text; favored by direct, well-structured prose."}, {"term": "Semantic HTML", "def": "Using meaningful tags (<article>, <nav>, <section>) over generic <div>s so structure is machine-clear."}, {"term": "Above the fold", "def": "The portion of a page visible without scrolling; heavy ads or slow content here hurt experience signals."}, {"term": "FAQ block", "def": "A question-and-answer section, marked up as FAQPage schema. High-value for GEO because it pre-answers the literal prompts users type to LLMs."}]}, {"category": "Information Architecture & Site Structure", "terms": [{"term": "IA (Information Architecture)", "def": "How a site's content is organized and how pages relate to each other."}, {"term": "Entity hub", "def": "The central page (your homepage) everything links back to and the schema resolves to; the gravitational anchor of the site's identity."}, {"term": "Money page", "def": "A page built to convert, targeting high-commercial-intent searches. Sits closest to the buying decision."}, {"term": "Vertical", "def": "An industry segment (DUI/criminal-defense, HVAC). “Vertical page” = a page targeting one."}, {"term": "Topic cluster", "def": "A group of interlinked pages covering one subject comprehensively, signaling topical authority."}, {"term": "Topical authority", "def": "The accumulated signal that you're a comprehensive source on a subject, not a one-off mention. Built via clusters and internal linking."}, {"term": "Pillar page / hub page", "def": "The central page of a cluster (e.g. /industries/) that links out to its members."}, {"term": "Breadcrumb", "def": "The Home › Industries › HVAC navigation trail; also marked up in schema (BreadcrumbList) to show hierarchy."}]}, {"category": "Technical SEO & Performance", "terms": [{"term": "Core Web Vitals", "def": "Google's set of user-experience metrics — loading (LCP), interactivity (INP), and visual stability (CLS)."}, {"term": "LCP (Largest Contentful Paint)", "def": "How long until the main content of a page renders; a loading-speed metric (good is under ~2.5s)."}, {"term": "INP (Interaction to Next Paint)", "def": "Responsiveness to user input across the whole visit; replaced FID as a Core Web Vital in 2024."}, {"term": "CLS (Cumulative Layout Shift)", "def": "How much the page jumps around as it loads; lower is better."}, {"term": "TTFB (Time To First Byte)", "def": "How long the server takes to send the first byte of response; an early speed signal."}, {"term": "HTTPS / SSL", "def": "Encrypted connection (the padlock); a baseline trust and ranking requirement."}, {"term": "Redirect (301 / 302)", "def": "Forwarding one URL to another; 301 is permanent (passes signals), 302 is temporary."}, {"term": "Redirect chain", "def": "A URL that redirects to another that redirects again; wastes crawl resources and leaks signal."}, {"term": "Status codes", "def": "Server responses: 200 (OK), 301/302 (redirect), 404 (not found), 410 (gone), 500 (server error), 503 (unavailable)."}, {"term": "Hreflang", "def": "Markup telling engines which language/region version of a page to serve to which users."}, {"term": "JavaScript SEO", "def": "Ensuring JS-built content is crawlable and indexable, since many bots render JS poorly or not at all."}, {"term": "Lazy loading", "def": "Deferring off-screen images/content until needed; speeds load but must be implemented so crawlers still see content."}, {"term": "Faceted navigation", "def": "Filter/sort URL combinations (color, size, price) that can explode into near-infinite crawlable pages if unmanaged."}, {"term": "CDN (Content Delivery Network)", "def": "A network of edge servers delivering your files fast from locations near each visitor."}, {"term": "Pagination", "def": "How sequential pages (page 1, 2, 3…) are linked and signaled so engines crawl the full set."}]}, {"category": "Rendering & Build Stack", "terms": [{"term": "Rendering", "def": "How a page's content goes from code to viewable HTML. Where this happens (server, build-time, or browser) determines whether bots can read it."}, {"term": "SSG (Static Site Generation)", "def": "Pages are pre-built into finished HTML at build time. Fastest, and content is fully present in the raw HTML."}, {"term": "SSR (Server-Side Rendering)", "def": "HTML is generated on the server per request. Also bot-readable; better when content changes frequently."}, {"term": "CSR (Client-Side Rendering)", "def": "The browser builds the page with JavaScript after loading a near-empty shell. Many AI crawlers won't execute JS, so content is invisible to them — the thing to avoid."}, {"term": "SPA (Single-Page Application)", "def": "A site that loads once and rewrites content via JS without full page reloads. Typically CSR."}, {"term": "Hydration", "def": "When a static/server-rendered page gets JS layered on afterward to make it interactive. Lets you get raw-HTML readability and interactivity."}, {"term": "Build step", "def": "The process that compiles source code into the deployable site. “Build time” = when this runs (vs. “runtime” = when a user visits)."}]}, {"category": "Structured Data & Rich Results", "terms": [{"term": "Schema.org", "def": "The shared vocabulary for structured data, backed by the major search engines."}, {"term": "Structured data", "def": "Machine-readable markup that labels what things on a page are (an Organization, a Product, a Review)."}, {"term": "JSON-LD", "def": "The preferred format for structured data: a script block in the page's HTML (vs. older inline Microdata/RDFa)."}, {"term": "Microdata / RDFa", "def": "Older, inline ways of embedding structured data directly in HTML attributes; largely superseded by JSON-LD."}, {"term": "Rich result / rich snippet", "def": "An enhanced listing (star ratings, FAQ dropdowns, recipe cards) produced when valid schema is present."}, {"term": "Knowledge Graph", "def": "Google's database of entities and their relationships, which powers entity understanding and panels."}, {"term": "Knowledge Panel", "def": "The information box about a known entity (person, brand, place) shown beside or above results."}, {"term": "Entity", "def": "Any distinct, identifiable thing — a business, person, place, concept — that engines try to recognize and resolve."}, {"term": "Schema types", "def": "Specific classes you mark up: Organization, LocalBusiness, Product, Review, FAQPage, HowTo, Article, Event, Person, BreadcrumbList."}, {"term": "Open Graph tags", "def": "Meta tags (og:title, og:image) controlling how a link previews when shared on social platforms."}, {"term": "Twitter Cards", "def": "X/Twitter's equivalent of Open Graph for controlling shared-link previews."}, {"term": "@graph", "def": "A JSON-LD wrapper holding multiple schema nodes in one block so they can interrelate, instead of isolated per-page snippets."}, {"term": "@id", "def": "A unique URL-shaped identifier on each schema node (.../#organization) that lets other nodes reference it. The wiring that turns scattered facts into a connected graph."}, {"term": "@type", "def": "Declares what a node is (Organization, Person, Service, FAQPage). Drawn from Schema.org's type list."}, {"term": "sameAs", "def": "A schema property listing other URLs for the same entity (your LinkedIn, Reddit, directory profiles). The explicit “these are all me” declaration for entity reconciliation."}, {"term": "knowsAbout", "def": "A schema property listing topics an entity has expertise in. Feeds the engine's sense of you as an authority on a subject."}, {"term": "Entity reconciliation / resolution", "def": "The engine's process of deciding that scattered references all point to the same entity. Schema @id/sameAs and NAP consistency make this easy; ambiguity makes it fail."}]}, {"category": "Off-Page SEO, Links & Authority", "terms": [{"term": "Backlink (inbound link)", "def": "A link from another site to yours; still one of the strongest authority signals."}, {"term": "Link building", "def": "The practice of earning or acquiring backlinks to grow authority."}, {"term": "Link equity (link juice)", "def": "The ranking value passed through a link; influenced by the source's authority and relevance."}, {"term": "PageRank", "def": "Google's original algorithm valuing pages by the quantity and quality of links pointing to them; still conceptually alive."}, {"term": "Dofollow / nofollow", "def": "A nofollow link tells engines not to pass authority; dofollow (the default) passes it."}, {"term": "Sponsored / UGC", "def": "Link attributes flagging paid links (rel=sponsored) and user-generated content (rel=ugc)."}, {"term": "Referring domain", "def": "A unique site linking to you; ten links from one domain count less than links from ten domains."}, {"term": "Domain Authority (DA) / Domain Rating (DR)", "def": "Third-party (Moz, Ahrefs) 0–100 scores estimating a domain's link strength; not Google metrics."}, {"term": "Anchor text distribution", "def": "The mix of anchor phrases pointing to a page; an unnaturally exact-match mix can look manipulative."}, {"term": "Link velocity", "def": "The rate at which a site gains links; sudden unnatural spikes can raise spam flags."}, {"term": "Toxic / spam link", "def": "A low-quality or manipulative inbound link that can harm rather than help."}, {"term": "Disavow", "def": "Telling Google to ignore specified harmful backlinks via the disavow tool."}, {"term": "Digital PR", "def": "Earning high-authority links and mentions through newsworthy content, data, and outreach."}, {"term": "Co-citation / co-occurrence", "def": "Being mentioned alongside related brands or terms, which reinforces topical association even without a link."}, {"term": "Unlinked mention", "def": "A reference to your brand without a hyperlink; still a signal, and increasingly relevant for AI visibility."}]}, {"category": "Local SEO", "terms": [{"term": "Google Business Profile (GBP)", "def": "Your free business listing on Google (formerly Google My Business); the backbone of local visibility."}, {"term": "Local pack / map pack", "def": "The boxed cluster of three local businesses with a map shown for local-intent queries."}, {"term": "NAP (Name, Address, Phone)", "def": "The consistent identity fingerprint used to match your business across the web."}, {"term": "Citation", "def": "A mention of your NAP on directories and sites; consistency strengthens entity recognition."}, {"term": "Proximity", "def": "How close the searcher is to the business; one of the strongest local ranking factors."}, {"term": "Local landing page", "def": "A page targeting a specific city/service combination to capture geo-specific intent."}, {"term": "Service area business", "def": "A business that serves customers at their location rather than a storefront, handled specially in GBP."}, {"term": "Review signals", "def": "Volume, rating, recency, and keywords of reviews; major influence on local rank and click-through."}]}, {"category": "SERP Features & Result Types", "terms": [{"term": "SERP (Search Engine Results Page)", "def": "The page of results a search engine returns for a query."}, {"term": "Featured snippet", "def": "A boxed, extracted answer pulled to the top of results (\"position zero\")."}, {"term": "People Also Ask (PAA)", "def": "An expandable list of related questions and answers within the SERP."}, {"term": "AI Overview", "def": "Google's generative answer summary at the top of results (formerly Search Generative Experience / SGE)."}, {"term": "Sitelinks", "def": "Extra indented links to key pages shown beneath a primary result for branded or strong queries."}, {"term": "Image pack / video carousel", "def": "Grouped image or video results inserted into the SERP for visual queries."}, {"term": "Top Stories", "def": "A carousel of fresh news results for newsworthy queries."}, {"term": "Shopping results", "def": "Product listings (often paid) with images, prices, and merchants."}, {"term": "Related searches", "def": "Suggested follow-up queries shown to help users refine intent."}, {"term": "Position zero", "def": "Informal name for the featured-snippet slot above the first organic result."}]}, {"category": "Generative Engines & AI Answer Optimization", "terms": [{"term": "Generative / answer engine", "def": "An AI system that synthesizes a direct answer (ChatGPT, Gemini, Perplexity, Claude, AI Overviews) instead of returning a list of links."}, {"term": "LLM (Large Language Model)", "def": "The model class behind generative engines, trained to produce text and, increasingly, to retrieve and cite sources."}, {"term": "RAG (Retrieval-Augmented Generation)", "def": "When an LLM fetches live external info before answering, rather than relying only on training memory. The mechanism GEO targets."}, {"term": "Grounding", "def": "Tying a model's answer to retrieved/live sources rather than memory alone; \"web-grounded\" means it searched."}, {"term": "Citation", "def": "In GEO, an instance of an engine referencing or recommending you in its answer — the outcome you optimize for."}, {"term": "Chunking", "def": "How a system splits content into passages for retrieval; clean, self-contained sections get retrieved more reliably."}, {"term": "Embedding / vector", "def": "A numeric representation of meaning used to match content to queries by semantic similarity, not just keywords."}, {"term": "Semantic search", "def": "Matching on meaning and intent rather than literal keyword overlap."}, {"term": "Query fan-out", "def": "When an AI engine silently breaks one query into several sub-queries, retrieves for each, and synthesizes — so you must cover the sub-questions."}, {"term": "llms.txt", "def": "A proposed standard file mapping your key pages and topics for LLMs; a curated guide to what matters most."}, {"term": "AI crawlers", "def": "Bots that gather content for AI systems (GPTBot, ClaudeBot, PerplexityBot, Google-Extended)."}, {"term": "AI-use token", "def": "A directive (Google-Extended, Applebot-Extended) controlling whether content may be used for AI, separate from search crawling."}, {"term": "Hallucination", "def": "When a model states something confidently false; clear, citable facts about you reduce the odds it gets you wrong."}, {"term": "Quotability", "def": "How readily a passage can be lifted verbatim as an answer; short, declarative, fact-dense lines win."}, {"term": "AI share of voice", "def": "How often your brand appears or is cited across AI answers for your target prompts; the GEO analog of rank tracking."}]}, {"category": "Measurement, Analytics & Metrics", "terms": [{"term": "Impressions", "def": "How many times your listing appeared in results for tracked queries."}, {"term": "Clicks", "def": "How many times users clicked through to your site from results."}, {"term": "CTR (Click-Through Rate)", "def": "Clicks divided by impressions; a measure of how compelling your listing is at its given position."}, {"term": "Average position", "def": "The mean ranking of your pages for tracked queries over a period."}, {"term": "Organic traffic", "def": "Visits arriving from unpaid search results."}, {"term": "Bounce rate / engagement rate", "def": "Bounce rate is the share of single-action visits; GA4 replaced it with engagement rate (the share of engaged sessions)."}, {"term": "Dwell time", "def": "How long a user stays on your page after clicking from search before returning."}, {"term": "Conversion rate", "def": "The share of visitors who complete a desired action (form, call, purchase)."}, {"term": "CPC / CPA", "def": "Cost Per Click and Cost Per Acquisition; paid-search cost metrics that also gauge a keyword's commercial value."}, {"term": "ROAS / ROI", "def": "Return On Ad Spend and Return On Investment; the profitability lens on search efforts."}, {"term": "Attribution", "def": "Assigning credit for a conversion across the touchpoints that led to it."}, {"term": "Google Search Console (GSC)", "def": "Google's free tool reporting your impressions, clicks, queries, indexing status, and issues."}, {"term": "Google Analytics 4 (GA4)", "def": "Google's event-based analytics platform for measuring on-site behavior and conversions."}, {"term": "Rank tracking", "def": "Monitoring your positions for target keywords over time."}, {"term": "SERP volatility", "def": "The degree of day-to-day ranking flux, often a sign of an algorithm update in progress."}]}, {"category": "Algorithms, Updates & Quality", "terms": [{"term": "Algorithm", "def": "The ranking system that orders results; updated continuously, with periodic large \"core\" changes."}, {"term": "Core update", "def": "A broad, named algorithm change that can reshuffle rankings widely across topics."}, {"term": "Helpful Content system", "def": "Google machinery rewarding people-first content and demoting content made mainly to rank."}, {"term": "E-E-A-T (Experience, Expertise, Authoritativeness, Trustworthiness)", "def": "Google's content-quality framework, weighted heavily for sensitive topics; built via author info, citations, and reputation."}, {"term": "YMYL (Your Money or Your Life)", "def": "Topics affecting health, finances, or safety, where engines demand stronger trust signals."}, {"term": "Quality Rater Guidelines", "def": "Google's public manual for its human evaluators; a window into what \"quality\" formally means."}, {"term": "Manual action / penalty", "def": "A human-applied demotion or removal for guideline violations, reported in Search Console."}, {"term": "Spam policies", "def": "Google's published rules on manipulative tactics (cloaking, hidden text, link schemes) that trigger algorithmic or manual action."}, {"term": "Notable named systems", "def": "Historic/landmark components: Panda (content quality), Penguin (link spam), Hummingbird (semantics), RankBrain/BERT/MUM (language understanding)."}]}];
const ALL = [];
DATA.forEach((s,si)=> s.terms.forEach(t=> ALL.push({term:t.term, def:t.def, cat:s.category, ci:si, ex:t.example||null})));
function exHay(ex){ return ex ? (ex.title+' '+ex.rows.map(o=>o.t+' '+(o.note||'')).join(' ')) : ''; }
function exBlock(ex,q){
  const ind={H2:'ex-l1',FAQ:'ex-l1',H3:'ex-l2'},
        tag={H1:'ex-t-h1',H2:'ex-t-h2',H3:'ex-t-h3',FAQ:'ex-t-faq',PAGE:'ex-t-page'};
  let r='<div class="ex"><div class="ex-h">'+esc(ex.title)+'</div>';
  ex.rows.forEach(o=>{
    r+='<div class="ex-row '+(ind[o.h]||'')+'">'+
       '<span class="ex-tag '+(tag[o.h]||'')+'">'+esc(o.h)+'</span>'+
       '<span class="ex-text">'+hl(o.t,q)+(o.note?' <span class="ex-note">— '+hl(o.note,q)+'</span>':'')+'</span>'+
       '</div>';
  });
  return r+'</div>';
}

const qEl=document.getElementById('q'), listEl=document.getElementById('list'),
      countEl=document.getElementById('count'), chipsEl=document.getElementById('chips'),
      clearEl=document.getElementById('clear');
let activeCat=null, sortMode='cat';
const sortKey=t=> t.term.replace(/^[^a-z0-9]+/i,'').toLowerCase();
const letterOf=t=>{ const c=(sortKey(t)[0]||'#').toUpperCase(); return /[A-Z]/.test(c)?c:'#'; };

// auto-wrap things that look like code (tags, files, @props) in <code>
function codeify(s){
  return s.replace(/(&lt;[^&]+?&gt;|robots\.txt|llms\.txt|sitemap\.xml|rel=canonical|@\w+|H1[–-]H6)/g, '<code>$1</code>');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(text, q){
  let out = esc(text);
  if(q){
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    out = out.replace(re,'<mark>$1</mark>');
  }
  return codeify(out);
}

function buildChips(){
  const cats = ['All', ...DATA.map(s=>s.category)];
  chipsEl.innerHTML='';
  cats.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='chip'+((activeCat===null&&i===0)||activeCat===c?' active':'');
    el.textContent = c==='All'?'All':c.replace(/ &.*$/,'').replace(/^(.{18}).+/,'$1…');
    el.title=c;
    el.onclick=()=>{ activeCat = c==='All'?null:c; render(); };
    chipsEl.appendChild(el);
  });
}

function render(){
  const q=qEl.value.trim().toLowerCase();
  clearEl.style.display = qEl.value?'block':'none';
  let rows = ALL.filter(r=>{
    if(activeCat && r.cat!==activeCat) return false;
    if(!q) return true;
    return (r.term+' '+r.def+' '+exHay(r.ex)).toLowerCase().includes(q);
  });
  // refresh active chip states
  [...chipsEl.children].forEach(ch=>{
    const on = (ch.textContent==='All' && activeCat===null) || ch.title===activeCat;
    ch.classList.toggle('active',on);
  });
  countEl.textContent = rows.length + (rows.length===1?' term':' terms') + (q?` matching “${qEl.value.trim()}”`:'') ;
  if(!rows.length){ listEl.innerHTML='<div class="empty">No matches.<br>Try a different word.</div>'; return; }
  if(sortMode==='az') rows = rows.slice().sort((a,b)=> sortKey(a).localeCompare(sortKey(b)) || a.term.localeCompare(b.term));
  let html='', lastHead=null;
  rows.forEach(r=>{
    const head = sortMode==='az' ? letterOf(r) : r.cat;
    if(head!==lastHead){ html+=`<div class="seclabel">${esc(head)}</div>`; lastHead=head; }
    html+=`<div class="card"><p class="term">${hl(r.term,q)}</p>`+
          (r.def?`<p class="def">${hl(r.def,q)}</p>`:'')+
          (r.ex?exBlock(r.ex,q):'')+`</div>`;
  });
  listEl.innerHTML=html;
  window.scrollTo({top:0});
}

qEl.addEventListener('input',render);
clearEl.onclick=()=>{ qEl.value=''; qEl.focus(); render(); };
document.querySelectorAll('#seg button').forEach(b=> b.onclick=()=>{
  sortMode=b.dataset.mode;
  document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('active', x===b));
  render();
});
buildChips(); render();
</script>
</body>
</html>
